# Render Blueprint — Haka Live admin + API
#
# Two deploy targets for the same Vue admin source (apps/admin/src):
#
# 1. haka-live-admin (static) → admin.hakalive.com
#    Builds apps/admin/dist with base path "/" (npm run build).
#
# 2. haka-live-api (node web) → api.hakalive.com/admin
#    Backend npm run build also runs apps/admin build:embedded and copies
#    into apps/backend/admin-dist (base path "/admin/").
#
# Dashboard equivalents if not using Blueprint sync:
#
#   Admin static site
#     Root Directory: apps/admin
#     Build Command:  npm install && npm run build
#     Publish Path:   dist
#
#   Backend API
#     Root Directory: apps/backend
#     Build Command:  npm install && npm run build
#     Start Command:  node dist/scripts/prisma-recover.js && npx prisma migrate deploy && node dist/server.js
#
services:
  - type: web
    name: haka-live-admin
    runtime: static
    rootDir: apps/admin
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        value: https://api.hakalive.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Uncomment and wire env vars (DATABASE_URL, REDIS_URL, etc.) when syncing from Blueprint.
  # - type: web
  #   name: haka-live-api
  #   runtime: node
  #   rootDir: apps/backend
  #   buildCommand: npm install && npm run build
  #   startCommand: node dist/scripts/prisma-recover.js && npx prisma migrate deploy && node dist/server.js
