name: Keep backend warm

# Render spins idle services down, so the first request after a quiet period
# eats a 5-15s cold start — felt as "every page is slow to load" in the app.
# This pings /health on a schedule so the instance stays awake for real users.
#
# Notes / caveats:
# - GitHub's minimum schedule granularity is 5 minutes, and scheduled runs can
#   be delayed several minutes under load — so this keeps the service *mostly*
#   warm, not guaranteed-instant. For a hard guarantee, use a paid Render
#   instance that never sleeps, or a dedicated uptime monitor (UptimeRobot /
#   cron-job.org) hitting the same URL.
# - GitHub disables scheduled workflows after 60 days of repo inactivity; any
#   push re-enables them.

on:
  schedule:
    - cron: '*/5 * * * *' # every 5 minutes
  workflow_dispatch: {} # allow manual "Run workflow" from the Actions tab

# A slow run shouldn't stack up on the next tick.
concurrency:
  group: keep-backend-warm
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /health
        env:
          # Override in repo Settings → Secrets and variables → Actions → Variables
          # if the URL ever changes; falls back to the production host.
          HEALTH_URL: ${{ vars.BACKEND_HEALTH_URL || 'https://api.hakalive.com/health' }}
        run: |
          echo "Pinging $HEALTH_URL"
          # Generous max-time to absorb a cold start without failing the run.
          # --retry covers a single transient blip during wake-up.
          code=$(curl -sS -o /dev/null -w '%{http_code}' \
            --max-time 90 --retry 2 --retry-delay 10 --retry-all-errors \
            "$HEALTH_URL")
          echo "HTTP $code"
          # /health returns 200; treat any 2xx as awake.
          case "$code" in
            2*) echo "Backend is awake." ;;
            *)  echo "::warning::Unexpected status $code from $HEALTH_URL" ; exit 1 ;;
          esac
