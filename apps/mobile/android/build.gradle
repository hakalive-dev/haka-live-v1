// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
        classpath 'com.google.firebase:firebase-crashlytics-gradle:3.0.6'
        classpath 'com.google.gms:google-services:4.4.1'
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

subprojects { sub ->
  sub.configurations.configureEach {
    resolutionStrategy {
      def media3 = '1.9.0'
      force "androidx.media3:media3-exoplayer:${media3}"
      force "androidx.media3:media3-exoplayer-dash:${media3}"
      force "androidx.media3:media3-exoplayer-hls:${media3}"
      force "androidx.media3:media3-session:${media3}"
      force "androidx.media3:media3-ui:${media3}"
      force "androidx.media3:media3-datasource-okhttp:${media3}"
    }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
